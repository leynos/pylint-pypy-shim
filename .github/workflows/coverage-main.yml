name: Coverage (main)

# CodeScene accepts `cs-coverage upload` only for analysed branches, so
# main-branch coverage is uploaded here on push. Pull requests only
# generate coverage today (see ci.yml); the changed-line gate
# (`cs-coverage check`) is deferred until CodeScene enables the coverage
# gate for project 80100. This workflow also advances the coverage
# ratchet baseline: caches saved on main are readable by every
# pull-request run, so the baseline written here is the one ci.yml's
# ratchet check compares against.
#
# workflow_dispatch is required, not optional: merges performed by the
# dependabot-automerge workflow's GITHUB_TOKEN do not fire push-event
# workflows, so automerged changes to main only get coverage uploaded via
# a manual dispatch re-run.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install code
        run: make build

      - name: Generate coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: coverage.xml
          format: cobertura
          pytest-workers: ''
          with-ratchet: 'true'

      - name: Upload coverage to CodeScene
        if: env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: cobertura
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ env.CODESCENE_CLI_SHA256 }}
