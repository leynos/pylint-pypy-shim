name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Install CLI tools
        run: |
          for tool in mbake ty ruff; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Check spelling
        run: make spelling

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

      - name: Generate coverage
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@dfddcb6cf53a2583e55bf0c3536c01ed1f67dc16
        with:
          output-path: coverage.xml
          format: cobertura
          pytest-workers: ''
          with-ratchet: 'true'
      # The `mode: check` step is deliberately not wired in yet: CodeScene
      # project 80100 posts only the "Code Health Review" check today, not
      # "Code Coverage" — the gate is a per-project CodeScene-side setting
      # that has not been enabled here (ddlint#287 and chutoro#156 hit the
      # byte-identical "Lacks the gates configuration" error when it was
      # wired prematurely). Add the check step in a fast-follow PR once
      # coverage-main.yml has uploaded to main at least once and the gate
      # is confirmed to resolve, or once CodeScene confirms project 80100's
      # coverage gate is enabled.
